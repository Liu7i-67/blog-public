<!doctype html>
<html lang="zh-CN">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<title>游戏中心</title>
		<link rel="preconnect" href="https://fonts.googleapis.com" />
		<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
		<link rel="icon" href="/favicon.png" />
		<link
			href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Noto+Serif+SC:wght@400;700;900&family=JetBrains+Mono:wght@400;800&display=swap"
			rel="stylesheet" />
		<style>
			:root {
				--bg-base: #e6e3dd;
				--ink: #141414;
				--accent-red: #e63946;
				--accent-blue: #1d3557;
				--accent-yellow: #f4a261;
				--grid-line: rgba(20, 20, 20, 0.08);
			}

			* {
				box-sizing: border-box;
				margin: 0;
				padding: 0;
			}

			body {
				background-color: var(--bg-base);
				color: var(--ink);
				font-family: 'JetBrains Mono', 'Noto Serif SC', sans-serif;
				min-height: 100vh;
				display: flex;
				flex-direction: column;
				overflow-x: hidden;
				/* Architectural Draft Background */
				background-image: linear-gradient(var(--grid-line) 1px, transparent 1px), linear-gradient(90deg, var(--grid-line) 1px, transparent 1px);
				background-size: 40px 40px;
				background-position: center center;
			}

			/* Top Navigation Bar */
			.top-nav {
				display: flex;
				justify-content: space-between;
				align-items: center;
				padding: 20px 40px;
				border-bottom: 2px solid var(--ink);
				background: var(--bg-base);
				position: relative;
				z-index: 10;
			}

			.brand {
				display: flex;
				align-items: baseline;
				gap: 15px;
			}

			.brand h1 {
				font-family: 'Bebas Neue', sans-serif;
				font-size: 3rem;
				line-height: 0.9;
				letter-spacing: 2px;
				color: var(--ink);
			}

			.brand span {
				font-size: 0.85rem;
				font-weight: 800;
				text-transform: uppercase;
				letter-spacing: 4px;
				color: var(--accent-red);
				border: 1px solid var(--accent-red);
				padding: 2px 6px;
			}

			.nav-meta {
				font-size: 0.85rem;
				font-weight: 800;
				text-transform: uppercase;
				letter-spacing: 2px;
				display: flex;
				gap: 30px;
			}

			/* Main Content */
			.main-container {
				flex: 1;
				padding: 60px 40px;
				display: flex;
				flex-direction: column;
				position: relative;
			}

			.section-header {
				margin-bottom: 60px;
				position: relative;
				display: inline-block;
			}

			.section-header h2 {
				font-family: 'Noto Serif SC', serif;
				font-size: 4rem;
				font-weight: 900;
				line-height: 1.1;
				color: var(--ink);
				position: relative;
				z-index: 2;
			}

			.section-header::after {
				content: '';
				position: absolute;
				bottom: 10px;
				left: -10px;
				width: calc(100% + 20px);
				height: 20px;
				background: var(--accent-yellow);
				z-index: 1;
				transform: skew(-10deg);
			}

			/* Game Grid */
			.game-grid {
				display: grid;
				grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
				gap: 40px;
				width: 100%;
				max-width: 1400px;
				margin: 0 auto;
			}

			.game-card {
				display: block;
				text-decoration: none;
				color: var(--ink);
				background: var(--bg-base);
				border: 3px solid var(--ink);
				position: relative;
				transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
				cursor: pointer;
				overflow: hidden;
				display: flex;
				flex-direction: column;
			}

			/* Hard Shadow */
			.game-card::before {
				content: '';
				position: absolute;
				top: 8px;
				left: 8px;
				right: -11px;
				bottom: -11px;
				background: var(--ink);
				z-index: -1;
				transition: all 0.3s ease;
			}

			.game-card:hover {
				transform: translate(-4px, -4px);
			}

			.game-card:hover::before {
				top: 12px;
				left: 12px;
				right: -15px;
				bottom: -15px;
			}

			.card-visual {
				height: 180px;
				border-bottom: 3px solid var(--ink);
				display: flex;
				justify-content: center;
				align-items: center;
				font-size: 5rem;
				background-image: repeating-linear-gradient(45deg, transparent, transparent 10px, rgba(20, 20, 20, 0.05) 10px, rgba(20, 20, 20, 0.05) 20px);
				position: relative;
				transition: background-color 0.3s;
			}

			.game-card:hover .card-visual {
				background-color: #fff;
			}

			/* Abstract geometric shapes for default icons */
			.geo-icon {
				width: 80px;
				height: 80px;
				background: var(--ink);
				position: relative;
				transition: transform 0.5s ease;
			}

			.game-card:hover .geo-icon {
				transform: scale(1.1) rotate(10deg);
			}

			.card-info {
				padding: 24px;
				background: #fff;
				flex: 1;
				display: flex;
				flex-direction: column;
				justify-content: space-between;
			}

			.card-info h3 {
				font-family: 'Noto Serif SC', serif;
				font-size: 1.8rem;
				font-weight: 900;
				margin-bottom: 10px;
			}

			.card-info p {
				font-size: 0.9rem;
				color: #666;
				line-height: 1.5;
				margin-bottom: 20px;
			}

			.card-meta {
				display: flex;
				justify-content: space-between;
				align-items: center;
				font-weight: 800;
				font-size: 0.8rem;
				text-transform: uppercase;
			}

			.card-meta .tag {
				border: 1px solid var(--ink);
				padding: 4px 8px;
				border-radius: 20px;
			}

			.card-meta .arrow {
				font-family: 'JetBrains Mono', monospace;
				font-size: 1.2rem;
				transition: transform 0.2s;
			}

			.game-card:hover .card-meta .arrow {
				transform: translateX(5px);
			}

			/* Specific Visuals based on color tags in config */
			.color-red .card-visual {
				color: var(--accent-red);
			}
			.color-red .geo-icon {
				background: var(--accent-red);
				border-radius: 50%;
			}

			.color-blue .card-visual {
				color: var(--accent-blue);
			}
			.color-blue .geo-icon {
				background: var(--accent-blue);
				clip-path: polygon(50% 0%, 0% 100%, 100% 100%);
			}

			.color-yellow .card-visual {
				color: var(--accent-yellow);
			}
			.color-yellow .geo-icon {
				background: var(--accent-yellow);
				transform: rotate(45deg);
			}
			.game-card.color-yellow:hover .geo-icon {
				transform: scale(1.1) rotate(135deg);
			}

			.color-dark .card-visual {
				color: var(--ink);
			}

			/* Floating decoration */
			.decor-circle {
				position: fixed;
				bottom: -10vw;
				right: -10vw;
				width: 40vw;
				height: 40vw;
				border: 2px solid var(--accent-red);
				border-radius: 50%;
				opacity: 0.1;
				pointer-events: none;
				z-index: 0;
			}

			@media (max-width: 768px) {
				.top-nav {
					flex-direction: column;
					gap: 20px;
					align-items: flex-start;
				}
				.section-header h2 {
					font-size: 2.5rem;
				}
				.game-grid {
					grid-template-columns: 1fr;
				}
			}
		</style>
	</head>

			function renderGames() {
				const grid = document.getElementById('game-grid')

				games.forEach(game => {
					const card = document.createElement('a')
					card.href = game.link
					card.className = `game-card color-${game.theme}`

					// Determine icon: use emoji if provided, otherwise generic geometric shape
					const visualContent = game.emoji ? game.emoji : `<div class="geo-icon"></div>`

					card.innerHTML = `
                    <div class="card-visual">
                        ${visualContent}
                    </div>
                    <div class="card-info">
                        <div>
                            <h3>${game.title}</h3>
                            <p>${game.desc}</p>
                        </div>
                        <div class="card-meta">
                            <span class="tag">${game.type}</span>
                            <span class="arrow">-></span>
                        </div>
                    </div>
                `

					grid.appendChild(card)
				})
			}
