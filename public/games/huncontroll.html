<!doctype html>
<html lang="zh-CN">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
		<title>武装突袭 // GUN_FORCE</title>
		<link rel="icon" href="/favicon.png" />
		<link rel="preconnect" href="https://fonts.googleapis.com" />
		<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
		<link
			href="https://fonts.googleapis.com/css2?family=Black+Ops+One&family=DM+Mono:wght@400;500&family=Noto+Sans+SC:wght@700;900&display=swap"
			rel="stylesheet" />
		<style>
			:root {
				--bg-dark: #0f0f13;
				--bg-panel: #1a1a24;
				--ink: #000000;
				--white: #f8fafc;

				--hero: #00f0ff; /* Cyan */
				--bullet: #faff00; /* Yellow */
				--enemy: #ff0055; /* Pink/Red */
				--ground: #334155; /* Slate */
				--accent: #ff5500; /* Orange */
			}

			* {
				box-sizing: border-box;
				margin: 0;
				padding: 0;
				user-select: none;
				touch-action: none;
			}

			body {
				background-color: var(--bg-dark);
				color: var(--white);
				font-family: 'DM Mono', 'Noto Sans SC', monospace;
				height: 100vh;
				display: flex;
				justify-content: center;
				align-items: center;
				overflow: hidden;
				background-image:
					linear-gradient(rgba(255, 255, 255, 0.03) 1px, transparent 1px), linear-gradient(90deg, rgba(255, 255, 255, 0.03) 1px, transparent 1px);
				background-size: 32px 32px;
			}

			.arcade-cabinet {
				position: relative;
				width: 100%;
				max-width: 900px;
				height: 100vh;
				max-height: 600px;
				background: var(--bg-panel);
				border: 4px solid var(--hero);
				box-shadow:
					0 0 0 8px var(--ink),
					20px 20px 0px rgba(0, 0, 0, 0.8),
					inset 0 0 40px rgba(0, 240, 255, 0.1);
				display: flex;
				flex-direction: column;
				overflow: hidden;
			}

			/* Top HUD */
			.hud {
				display: flex;
				justify-content: space-between;
				align-items: center;
				padding: 15px 30px;
				background: var(--ink);
				border-bottom: 4px solid var(--hero);
				z-index: 10;
			}

			.hud-block {
				display: flex;
				flex-direction: column;
			}

			.hud-label {
				font-size: 0.7rem;
				color: var(--hero);
				text-transform: uppercase;
				letter-spacing: 2px;
				margin-bottom: 4px;
			}

			.hud-value {
				font-family: 'Black Ops One', cursive;
				font-size: 2rem;
				line-height: 1;
				color: var(--white);
				text-shadow: 2px 2px 0px var(--enemy);
			}

			.lives-container {
				display: flex;
				gap: 10px;
			}

			.life-token {
				width: 16px;
				height: 24px;
				background: var(--hero);
				border: 2px solid var(--white);
				transform: skew(-15deg);
			}

			.life-token.empty {
				background: transparent;
				border-color: var(--ground);
			}

			/* Screen Area */
			.screen {
				flex: 1;
				position: relative;
				background: #050508;
				overflow: hidden;
			}

			canvas {
				display: block;
				width: 100%;
				height: 100%;
				image-rendering: pixelated;
			}

			/* Scanlines */
			.screen::after {
				content: '';
				position: absolute;
				inset: 0;
				background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%);
				background-size: 100% 4px;
				pointer-events: none;
				z-index: 10;
			}

			/* Mobile Controls Overlay */
			.mobile-controls {
				position: absolute;
				bottom: 20px;
				left: 20px;
				right: 20px;
				display: flex;
				justify-content: space-between;
				z-index: 20;
				pointer-events: none; /* Let touches pass through to specific buttons */
			}

			.d-pad,
			.action-btns {
				display: flex;
				gap: 15px;
				pointer-events: auto;
			}

			.ctrl-btn {
				width: 60px;
				height: 60px;
				background: rgba(255, 255, 255, 0.1);
				border: 2px solid rgba(255, 255, 255, 0.3);
				border-radius: 50%;
				display: flex;
				justify-content: center;
				align-items: center;
				color: rgba(255, 255, 255, 0.5);
				font-weight: 900;
				font-size: 1.2rem;
				user-select: none;
			}

			.ctrl-btn:active {
				background: rgba(0, 240, 255, 0.4);
				border-color: var(--hero);
				color: var(--white);
			}

			/* Menus */
			.overlay {
				position: absolute;
				inset: 0;
				background: rgba(15, 15, 19, 0.9);
				backdrop-filter: blur(5px);
				z-index: 30;
				display: flex;
				flex-direction: column;
				justify-content: center;
				align-items: center;
				text-align: center;
				opacity: 0;
				pointer-events: none;
				transition: opacity 0.3s;
			}

			.overlay.active {
				opacity: 1;
				pointer-events: auto;
			}

			.overlay h1 {
				font-family: 'Black Ops One', 'Noto Sans SC', cursive;
				font-size: 5rem;
				color: var(--white);
				text-shadow: 6px 6px 0px var(--enemy);
				margin-bottom: 10px;
				letter-spacing: 4px;
			}

			.overlay p {
				color: var(--hero);
				font-size: 1.2rem;
				margin-bottom: 40px;
				letter-spacing: 2px;
				font-weight: 700;
			}

			.btn {
				background: var(--hero);
				color: var(--ink);
				border: 4px solid var(--white);
				padding: 15px 40px;
				font-family: 'Noto Sans SC', sans-serif;
				font-weight: 900;
				font-size: 1.5rem;
				cursor: pointer;
				box-shadow: 8px 8px 0px var(--ink);
				transition: all 0.1s;
				text-transform: uppercase;
			}

			.btn:hover {
				transform: translate(2px, 2px);
				box-shadow: 6px 6px 0px var(--ink);
				background: var(--white);
			}
			.btn:active {
				transform: translate(8px, 8px);
				box-shadow: 0px 0px 0px var(--ink);
			}

			.instructions {
				margin-top: 30px;
				font-size: 0.85rem;
				color: #888;
				line-height: 1.8;
				background: var(--ink);
				padding: 15px;
				border: 1px solid var(--ground);
			}

			kbd {
				background: #333;
				color: #fff;
				padding: 2px 6px;
				border-radius: 4px;
				border-bottom: 2px solid #111;
			}

			@media (max-width: 768px) {
				.arcade-cabinet {
					max-height: 100vh;
					border: none;
					box-shadow: none;
				}
				.overlay h1 {
					font-size: 3rem;
				}
				.mobile-controls {
					display: flex;
				} /* Show on small screens */
			}
			@media (min-width: 769px) {
				.mobile-controls {
					display: none;
				} /* Hide on desktop */
			}
		</style>
	</head>
	<body>
		<div class="arcade-cabinet">
			<div class="hud">
				<div class="hud-block">
					<span class="hud-label">得分</span>
					<span class="hud-value" id="scoreUi">0000</span>
				</div>
				<div class="hud-block" style="align-items: flex-end">
					<span class="hud-label">增援</span>
					<div class="lives-container" id="livesUi">
						<div class="life-token"></div>
						<div class="life-token"></div>
						<div class="life-token"></div>
					</div>
				</div>
			</div>

			<div class="screen">
				<canvas id="gameCanvas"></canvas>

				<div class="mobile-controls">
					<div class="d-pad">
						<div class="ctrl-btn" id="btn-left">←</div>
						<div class="ctrl-btn" id="btn-right">→</div>
					</div>
					<div class="action-btns">
						<div class="ctrl-btn" id="btn-jump">↑</div>
						<div class="ctrl-btn" id="btn-fire">🔥</div>
					</div>
				</div>

				<div class="overlay active" id="startScreen">
					<h1>武装突袭</h1>
					<p>RUN & GUN PROTOCOL</p>
					<button class="btn" onclick="startGame()">部署作战</button>
					<div class="instructions">
						键盘: <kbd>A</kbd> <kbd>D</kbd> 移动 | <kbd>W</kbd> 或 <kbd>SPACE</kbd> 跳跃 | <kbd>J</kbd> 或 鼠标点击 射击<br />
						触屏: 使用底部控制面板
					</div>
				</div>

				<div class="overlay" id="gameOverScreen">
					<h1 style="color: var(--enemy); text-shadow: 6px 6px 0px var(--white)">全军覆没</h1>
					<p>信号已断开</p>
					<div class="hud-label" style="margin-bottom: 5px">最终得分</div>
					<div class="hud-value" id="finalScore" style="font-size: 3rem; margin-bottom: 30px">0</div>
					<button class="btn" onclick="startGame()">重新部署</button>
				</div>
			</div>
		</div>

		<script>
			const canvas = document.getElementById('gameCanvas')
			const ctx = canvas.getContext('2d')
			const scoreUi = document.getElementById('scoreUi')
			const livesUi = document.getElementById('livesUi')
			const startScreen = document.getElementById('startScreen')
			const gameOverScreen = document.getElementById('gameOverScreen')
			const finalScoreUi = document.getElementById('finalScore')

			// Style Colors
			const C = {
				hero: '#00F0FF',
				bullet: '#FAFF00',
				enemy: '#FF0055',
				ground: '#334155',
				white: '#F8FAFC'
			}

			let width, height
			function resize() {
				width = canvas.parentElement.clientWidth
				height = canvas.parentElement.clientHeight
				canvas.width = width
				canvas.height = height
			}
			window.addEventListener('resize', resize)
			resize()

			// Input State
			const keys = { left: false, right: false, up: false, shoot: false }

			window.addEventListener('keydown', e => {
				if (e.code === 'KeyA' || e.code === 'ArrowLeft') keys.left = true
				if (e.code === 'KeyD' || e.code === 'ArrowRight') keys.right = true
				if (e.code === 'KeyW' || e.code === 'ArrowUp' || e.code === 'Space') keys.up = true
				if (e.code === 'KeyJ') keys.shoot = true
			})
			window.addEventListener('keyup', e => {
				if (e.code === 'KeyA' || e.code === 'ArrowLeft') keys.left = false
				if (e.code === 'KeyD' || e.code === 'ArrowRight') keys.right = false
				if (e.code === 'KeyW' || e.code === 'ArrowUp' || e.code === 'Space') keys.up = false
				if (e.code === 'KeyJ') keys.shoot = false
			})
			canvas.addEventListener('mousedown', () => (keys.shoot = true))
			canvas.addEventListener('mouseup', () => (keys.shoot = false))

			// Mobile touch hooks
			const bindBtn = (id, key) => {
				const el = document.getElementById(id)
				if (!el) return
				el.addEventListener('touchstart', e => {
					e.preventDefault()
					keys[key] = true
				})
				el.addEventListener('touchend', e => {
					e.preventDefault()
					keys[key] = false
				})
			}
			bindBtn('btn-left', 'left')
			bindBtn('btn-right', 'right')
			bindBtn('btn-jump', 'up')
			bindBtn('btn-fire', 'shoot')

			// Game State
			let state = 'start'
			let score = 0
			let lives = 3
			let frame = 0
			let animId
			let cameraX = 0

			// Entities
			let player = {}
			let bullets = []
			let enemies = []
			let platforms = []
			let particles = []

			function startGame() {
				state = 'play'
				score = 0
				lives = 3
				frame = 0
				cameraX = 0

				updateScore()
				updateLives()
				startScreen.classList.remove('active')
				gameOverScreen.classList.remove('active')

				initLevel()
				spawnPlayer()

				if (animId) cancelAnimationFrame(animId)
				loop()
			}

			function initLevel() {
				platforms = []
				bullets = []
				enemies = []
				particles = []

				// Ground floor
				platforms.push({ x: -100, y: height - 50, w: 10000, h: 100 })

				// Generate some jumping platforms
				for (let i = 0; i < 50; i++) {
					const px = 400 + i * 250 + Math.random() * 100
					const py = height - 100 - Math.random() * 150
					platforms.push({ x: px, y: py, w: 100 + Math.random() * 80, h: 20 })
				}
			}

			function spawnPlayer() {
				player = {
					x: 100,
					y: height - 100,
					w: 24,
					h: 48,
					vx: 0,
					vy: 0,
					speed: 5,
					jumpForce: -12,
					gravity: 0.6,
					grounded: false,
					facingRight: true,
					fireTimer: 0,
					fireRate: 10,
					invulnTimer: 120 // 2 seconds i-frames
				}
			}

			function updateScore() {
				scoreUi.textContent = score.toString().padStart(4, '0')
			}

			function updateLives() {
				const tokens = livesUi.children
				for (let i = 0; i < 3; i++) {
					if (i < lives) tokens[i].classList.remove('empty')
					else tokens[i].classList.add('empty')
				}
			}

			function die() {
				createExplosion(player.x + player.w / 2, player.y + player.h / 2, C.hero, 30)
				lives--
				updateLives()

				if (lives <= 0) {
					state = 'gameover'
					finalScoreUi.textContent = score
					gameOverScreen.classList.add('active')
				} else {
					// Respawn slightly back and high
					player.x = cameraX + 100
					player.y = 50
					player.vx = 0
					player.vy = 0
					player.invulnTimer = 120
				}
			}

			function spawnEnemy() {
				// Spawn enemies just outside camera right
				if (frame % 60 === 0) {
					const x = cameraX + width + 50
					const y = height - 90 // spawn on ground
					enemies.push({
						x,
						y,
						w: 24,
						h: 40,
						vx: -2,
						hp: 1,
						type: 'runner',
						color: C.enemy
					})
				}

				// Sometimes spawn a turret
				if (frame % 150 === 0 && cameraX > 500) {
					const x = cameraX + width + 50
					enemies.push({
						x,
						y: height - 120,
						w: 30,
						h: 30,
						vx: 0,
						hp: 3,
						type: 'turret',
						color: C.accent,
						fireTimer: 0
					})
				}
			}

			function createExplosion(x, y, color, count = 10) {
				for (let i = 0; i < count; i++) {
					const a = Math.random() * Math.PI * 2
					const v = Math.random() * 5 + 1
					particles.push({
						x,
						y,
						vx: Math.cos(a) * v,
						vy: Math.sin(a) * v,
						life: 1,
						color,
						size: Math.random() * 4 + 2
					})
				}
			}

			function checkAABB(r1, r2) {
				return r1.x < r2.x + r2.w && r1.x + r1.w > r2.x && r1.y < r2.y + r2.h && r1.y + r1.h > r2.y
			}

			function update() {
				frame++

				// Player Input
				if (keys.left) {
					player.vx = -player.speed
					player.facingRight = false
				} else if (keys.right) {
					player.vx = player.speed
					player.facingRight = true
				} else {
					player.vx = 0
				}

				if (keys.up && player.grounded) {
					player.vy = player.jumpForce
					player.grounded = false
				}

				// Player Physics
				player.vy += player.gravity

				player.x += player.vx
				// Prevent going left of camera
				if (player.x < cameraX) player.x = cameraX

				// X Collision
				for (let p of platforms) {
					if (checkAABB(player, p)) {
						if (player.vx > 0) player.x = p.x - player.w
						else if (player.vx < 0) player.x = p.x + p.w
					}
				}

				player.y += player.vy
				player.grounded = false
				// Y Collision
				for (let p of platforms) {
					if (checkAABB(player, p)) {
						if (player.vy > 0) {
							// falling
							player.y = p.y - player.h
							player.vy = 0
							player.grounded = true
						} else if (player.vy < 0) {
							// jumping up hitting ceiling
							player.y = p.y + p.h
							player.vy = 0
						}
					}
				}

				// Fall in pit
				if (player.y > height + 50) die()

				// Timers
				if (player.invulnTimer > 0) player.invulnTimer--
				if (player.fireTimer > 0) player.fireTimer--

				// Shooting
				if (keys.shoot && player.fireTimer <= 0) {
					const dir = player.facingRight ? 1 : -1
					bullets.push({
						x: player.x + (player.facingRight ? player.w : -10),
						y: player.y + 15,
						vx: dir * 12,
						vy: 0,
						w: 12,
						h: 4,
						color: C.bullet,
						isPlayer: true
					})
					player.fireTimer = player.fireRate
				}

				// Camera follow
				if (player.x > cameraX + width * 0.4) {
					cameraX = player.x - width * 0.4
				}

				spawnEnemy()

				// Update Bullets
				for (let i = bullets.length - 1; i >= 0; i--) {
					let b = bullets[i]
					b.x += b.vx
					b.y += b.vy

					// Remove off screen
					if (b.x < cameraX - 100 || b.x > cameraX + width + 100) {
						bullets.splice(i, 1)
						continue
					}

					// Check collision with platforms (simplified, just remove bullet)
					let hitWall = false
					for (let p of platforms) {
						if (checkAABB(b, p)) {
							hitWall = true
							break
						}
					}
					if (hitWall) {
						createExplosion(b.x, b.y, b.color, 3)
						bullets.splice(i, 1)
						continue
					}

					// Bullet hit logic
					if (b.isPlayer) {
						let hit = false
						for (let j = enemies.length - 1; j >= 0; j--) {
							let e = enemies[j]
							if (checkAABB(b, e)) {
								e.hp--
								hit = true
								createExplosion(b.x, b.y, C.white, 3)
								if (e.hp <= 0) {
									score += e.type === 'turret' ? 50 : 10
									updateScore()
									createExplosion(e.x + e.w / 2, e.y + e.h / 2, e.color, 15)
									enemies.splice(j, 1)
								}
								break
							}
						}
						if (hit) bullets.splice(i, 1)
					} else {
						// Enemy bullet hits player
						if (player.invulnTimer <= 0 && checkAABB(b, player)) {
							bullets.splice(i, 1)
							die()
						}
					}
				}

				// Update Enemies
				for (let i = enemies.length - 1; i >= 0; i--) {
					let e = enemies[i]

					if (e.type === 'runner') {
						// Simple gravity & move left
						e.vy = (e.vy || 0) + 0.6 // grav
						e.x += e.vx
						e.y += e.vy

						// Y Col
						for (let p of platforms) {
							if (checkAABB(e, p)) {
								if (e.vy > 0) {
									e.y = p.y - e.h
									e.vy = 0
								}
							}
						}
					} else if (e.type === 'turret') {
						e.fireTimer++
						if (e.fireTimer > 90 && e.x < cameraX + width) {
							// only fire if on screen
							// Shoot at player
							const dx = player.x - e.x
							const dy = player.y - e.y
							const dist = Math.hypot(dx, dy)
							bullets.push({
								x: e.x + 15,
								y: e.y + 15,
								vx: (dx / dist) * 5,
								vy: (dy / dist) * 5,
								w: 8,
								h: 8,
								color: C.enemy,
								isPlayer: false
							})
							e.fireTimer = 0
						}
					}

					// Enemy touches player
					if (player.invulnTimer <= 0 && checkAABB(player, e)) {
						die()
					}

					// Remove if far behind
					if (e.x < cameraX - 200 || e.y > height + 100) {
						enemies.splice(i, 1)
					}
				}

				// Update Particles
				for (let i = particles.length - 1; i >= 0; i--) {
					let p = particles[i]
					p.x += p.vx
					p.y += p.vy
					p.life -= 0.05
					if (p.life <= 0) particles.splice(i, 1)
				}
			}

			function draw() {
				// Background
				ctx.fillStyle = '#050508'
				ctx.fillRect(0, 0, width, height)

				ctx.save()
				ctx.translate(-cameraX, 0)

				// Draw Background Grid Parallax
				ctx.strokeStyle = 'rgba(0, 240, 255, 0.05)'
				ctx.lineWidth = 1
				ctx.beginPath()
				const startX = Math.floor((cameraX * 0.5) / 50) * 50
				for (let i = 0; i < width + 100; i += 50) {
					ctx.moveTo(startX + i + cameraX * 0.5, 0)
					ctx.lineTo(startX + i + cameraX * 0.5, height)
				}
				for (let i = 0; i < height; i += 50) {
					ctx.moveTo(cameraX, i)
					ctx.lineTo(cameraX + width, i)
				}
				ctx.stroke()

				// Draw Platforms
				for (let p of platforms) {
					ctx.fillStyle = C.ground
					ctx.fillRect(p.x, p.y, p.w, p.h)
					// Top border
					ctx.fillStyle = '#475569'
					ctx.fillRect(p.x, p.y, p.w, 4)
					// Deco
					ctx.strokeStyle = '#1E293B'
					ctx.lineWidth = 2
					ctx.strokeRect(p.x, p.y, p.w, p.h)
				}

				// Draw Enemies
				for (let e of enemies) {
					ctx.fillStyle = e.color
					if (e.type === 'runner') {
						// Runner shape
						ctx.fillRect(e.x, e.y, e.w, e.h)
						// Eye
						ctx.fillStyle = C.white
						ctx.fillRect(e.x + 4, e.y + 8, 8, 4)
					} else if (e.type === 'turret') {
						// Turret shape (Octagon-ish)
						ctx.beginPath()
						ctx.moveTo(e.x + 10, e.y)
						ctx.lineTo(e.x + 20, e.y)
						ctx.lineTo(e.x + 30, e.y + 10)
						ctx.lineTo(e.x + 30, e.y + 20)
						ctx.lineTo(e.x + 20, e.y + 30)
						ctx.lineTo(e.x + 10, e.y + 30)
						ctx.lineTo(e.x, e.y + 20)
						ctx.lineTo(e.x, e.y + 10)
						ctx.fill()
						// Gun barrel aiming at player
						const dx = player.x - e.x
						const dy = player.y - e.y
						const angle = Math.atan2(dy, dx)
						ctx.save()
						ctx.translate(e.x + 15, e.y + 15)
						ctx.rotate(angle)
						ctx.fillStyle = C.white
						ctx.fillRect(0, -3, 20, 6)
						ctx.restore()
					}
				}

				// Draw Player
				if (player.invulnTimer <= 0 || Math.floor(frame / 5) % 2 === 0) {
					ctx.fillStyle = C.hero
					ctx.fillRect(player.x, player.y, player.w, player.h)

					// Head/Visor
					ctx.fillStyle = C.white
					if (player.facingRight) {
						ctx.fillRect(player.x + 12, player.y + 6, 12, 6)
					} else {
						ctx.fillRect(player.x, player.y + 6, 12, 6)
					}

					// Gun
					ctx.fillStyle = C.accent
					if (player.facingRight) {
						ctx.fillRect(player.x + 10, player.y + 20, 20, 6)
					} else {
						ctx.fillRect(player.x - 6, player.y + 20, 20, 6)
					}
				}

				// Draw Bullets
				for (let b of bullets) {
					ctx.fillStyle = b.color
					ctx.shadowColor = b.color
					ctx.shadowBlur = 10
					ctx.fillRect(b.x, b.y, b.w, b.h)
					ctx.shadowBlur = 0
				}

				// Draw Particles
				for (let p of particles) {
					ctx.fillStyle = p.color
					ctx.globalAlpha = Math.max(0, p.life)
					ctx.fillRect(p.x, p.y, p.size, p.size)
				}
				ctx.globalAlpha = 1.0

				ctx.restore()
			}

			function loop() {
				if (state === 'play') {
					update()
				}
				draw()
				animId = requestAnimationFrame(loop)
			}

			// Draw initial
			draw()
		</script>
	</body>
</html>
