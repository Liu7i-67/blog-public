<!doctype html>
<html lang="zh-CN">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<title>排雷协议 // MINE_SWEEPER</title>
		<link rel="icon" href="/favicon.png" />
		<link rel="preconnect" href="https://fonts.googleapis.com" />
		<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
		<link
			href="https://fonts.googleapis.com/css2?family=DM+Mono:ital,wght@0,400;0,500;1,400&family=Noto+Sans+SC:wght@400;700;900&display=swap"
			rel="stylesheet" />
		<style>
			:root {
				/* Terminal UI Palette */
				--bg-deep: #0d1117;
				--bg-panel: #1e293b;
				--primary: #10b981; /* Green */
				--primary-dim: rgba(16, 185, 129, 0.2);
				--danger: #ef4444; /* Red */
				--danger-dim: rgba(239, 68, 68, 0.2);
				--text-main: #f8fafc;
				--text-dim: #94a3b8;
				--grid-line: #334155;
				--cell-hidden: #2a3b4c;
				--cell-revealed: #0f172a;

				/* Numbers colors mapped like classic */
				--n1: #38bdf8;
				--n2: #4ade80;
				--n3: #f87171;
				--n4: #a78bfa;
				--n5: #fbbf24;
				--n6: #2dd4bf;
				--n7: #f472b6;
				--n8: #9ca3af;
			}

			* {
				box-sizing: border-box;
				margin: 0;
				padding: 0;
			}

			body {
				background-color: var(--bg-deep);
				color: var(--text-main);
				font-family: 'DM Mono', 'Noto Sans SC', monospace;
				min-height: 100vh;
				display: flex;
				justify-content: center;
				align-items: center;
				padding: 20px;
				/* Terminal scanline effect */
				background-image: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0, 0, 0, 0.1) 2px, rgba(0, 0, 0, 0.1) 4px);
			}

			.terminal-window {
				background-color: var(--bg-panel);
				border: 1px solid var(--grid-line);
				border-radius: 6px;
				box-shadow:
					0 25px 50px -12px rgba(0, 0, 0, 0.5),
					0 0 0 1px rgba(255, 255, 255, 0.05) inset;
				width: 100%;
				max-width: 800px;
				overflow: hidden;
				display: flex;
				flex-direction: column;
			}

			/* Top Bar */
			.window-header {
				background: #0b0f19;
				padding: 10px 16px;
				display: flex;
				justify-content: space-between;
				align-items: center;
				border-bottom: 1px solid var(--grid-line);
				font-size: 0.85rem;
				color: var(--text-dim);
			}

			.window-title {
				display: flex;
				align-items: center;
				gap: 10px;
			}

			.status-dot {
				width: 8px;
				height: 8px;
				border-radius: 50%;
				background-color: var(--primary);
				box-shadow: 0 0 10px var(--primary);
				animation: pulse 2s infinite;
			}

			@keyframes pulse {
				0% {
					opacity: 1;
				}
				50% {
					opacity: 0.4;
				}
				100% {
					opacity: 1;
				}
			}

			/* Control Panel */
			.control-panel {
				padding: 20px;
				display: flex;
				flex-wrap: wrap;
				gap: 20px;
				justify-content: space-between;
				align-items: flex-end;
				background: rgba(0, 0, 0, 0.2);
				border-bottom: 1px solid var(--grid-line);
			}

			.hud-group {
				display: flex;
				flex-direction: column;
				gap: 6px;
			}

			.hud-label {
				font-size: 0.75rem;
				text-transform: uppercase;
				color: var(--text-dim);
				letter-spacing: 1px;
			}

			.hud-value {
				font-size: 2rem;
				font-weight: 500;
				color: var(--primary);
				text-shadow: 0 0 15px var(--primary-dim);
				line-height: 1;
				font-variant-numeric: tabular-nums;
			}

			.hud-value.danger {
				color: var(--danger);
				text-shadow: 0 0 15px var(--danger-dim);
			}

			/* Select and Button styling */
			select,
			button {
				background: var(--bg-deep);
				color: var(--text-main);
				border: 1px solid var(--grid-line);
				padding: 10px 16px;
				font-family: inherit;
				font-size: 0.9rem;
				border-radius: 4px;
				cursor: pointer;
				outline: none;
				transition: all 0.2s;
			}

			select:hover,
			button:hover {
				border-color: var(--text-dim);
				background: #161b22;
			}

			button {
				background: var(--primary-dim);
				color: var(--primary);
				border-color: var(--primary);
				font-weight: 700;
			}

			button:hover {
				background: var(--primary);
				color: var(--bg-deep);
				box-shadow: 0 0 15px var(--primary-dim);
			}

			/* Game Board Area */
			.game-area {
				padding: 30px;
				display: flex;
				justify-content: center;
				align-items: center;
				flex: 1;
				min-height: 300px;
				overflow: auto;
			}

			.board {
				display: grid;
				gap: 2px;
				background-color: var(--grid-line);
				padding: 2px;
				border-radius: 4px;
				box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
				/* Grid Template will be set via JS */
			}

			.cell {
				width: 32px;
				height: 32px;
				background-color: var(--cell-hidden);
				display: flex;
				justify-content: center;
				align-items: center;
				font-size: 1.1rem;
				font-weight: 700;
				cursor: pointer;
				transition:
					background-color 0.1s,
					transform 0.1s;
				user-select: none;
			}

			.cell:hover:not(.revealed) {
				background-color: #384c61;
			}

			.cell:active:not(.revealed) {
				transform: scale(0.95);
			}

			.cell.revealed {
				background-color: var(--cell-revealed);
				cursor: default;
			}

			.cell.flagged {
				color: var(--danger);
			}

			.cell.mine {
				background-color: var(--danger-dim);
				color: var(--danger);
			}

			.cell.mine.exploded {
				background-color: var(--danger);
				color: #fff;
				box-shadow: 0 0 15px var(--danger);
				z-index: 10;
			}

			/* Number Colors */
			.cell[data-num='1'] {
				color: var(--n1);
			}
			.cell[data-num='2'] {
				color: var(--n2);
			}
			.cell[data-num='3'] {
				color: var(--n3);
			}
			.cell[data-num='4'] {
				color: var(--n4);
			}
			.cell[data-num='5'] {
				color: var(--n5);
			}
			.cell[data-num='6'] {
				color: var(--n6);
			}
			.cell[data-num='7'] {
				color: var(--n7);
			}
			.cell[data-num='8'] {
				color: var(--n8);
			}

			/* Terminal Logs (Bottom) */
			.terminal-logs {
				background: #05080f;
				padding: 12px 20px;
				font-size: 0.8rem;
				color: var(--text-dim);
				border-top: 1px solid var(--grid-line);
				height: 80px;
				overflow-y: auto;
				display: flex;
				flex-direction: column;
				gap: 4px;
			}

			.log-entry {
				opacity: 0;
				animation: typeIn 0.2s forwards;
			}

			.log-entry.sys {
				color: var(--text-dim);
			}
			.log-entry.warn {
				color: var(--danger);
			}
			.log-entry.success {
				color: var(--primary);
			}

			@keyframes typeIn {
				to {
					opacity: 1;
				}
			}

			@media (max-width: 600px) {
				.cell {
					width: 26px;
					height: 26px;
					font-size: 0.9rem;
				}
				.control-panel {
					flex-direction: column;
					align-items: stretch;
				}
			}
		</style>
	</head>
	<body>
		<div class="terminal-window">
			<header class="window-header">
				<div class="window-title">
					<div class="status-dot" id="status-indicator"></div>
					<span>EXEC // 排雷协议_v3.1.4</span>
				</div>
				<div id="clock">00:00:00</div>
			</header>

			<section class="control-panel">
				<div class="hud-group">
					<span class="hud-label">威胁剩余</span>
					<span class="hud-value danger" id="mine-counter">000</span>
				</div>

				<div class="hud-group">
					<span class="hud-label">耗时</span>
					<span class="hud-value" id="timer">000</span>
				</div>

				<div class="hud-group" style="flex-direction: row; align-items: flex-end; gap: 15px; flex-wrap: wrap">
					<div>
						<span class="hud-label" style="display: block; margin-bottom: 6px">设定矩阵参数</span>
						<select id="difficulty">
							<option value="easy">入门 (9x9, 10雷)</option>
							<option value="medium" selected>专家 (16x16, 40雷)</option>
							<option value="hard">绝境 (30x16, 99雷)</option>
						</select>
					</div>
					<button id="reset-btn" onclick="initGame()">初始化扫描</button>
				</div>
			</section>

			<section class="game-area">
				<div class="board" id="board" oncontextmenu="return false;">
					<!-- Grid Cells -->
				</div>
			</section>

			<section class="terminal-logs" id="logs">
				<div class="log-entry sys">> 系统已就绪。等待指令...</div>
			</section>
		</div>

		<script>
			const boardEl = document.getElementById('board')
			const mineCounterEl = document.getElementById('mine-counter')
			const timerEl = document.getElementById('timer')
			const difficultySelect = document.getElementById('difficulty')
			const logsEl = document.getElementById('logs')
			const statusIndicator = document.getElementById('status-indicator')

			const difficulties = {
				easy: { rows: 9, cols: 9, mines: 10 },
				medium: { rows: 16, cols: 16, mines: 40 },
				hard: { rows: 16, cols: 30, mines: 99 }
			}

			let currentConfig
			let grid = []
			let minesLeft = 0
			let revealedCount = 0
			let isGameOver = false
			let isFirstClick = true
			let timerInterval = null
			let secondsElapsed = 0

			function log(msg, type = 'sys') {
				const entry = document.createElement('div')
				entry.className = `log-entry ${type}`
				const time = new Date().toLocaleTimeString('en-US', { hour12: false })
				entry.textContent = `[${time}] ${msg}`
				logsEl.appendChild(entry)
				logsEl.scrollTop = logsEl.scrollHeight
			}

			// Live clock for window header
			setInterval(() => {
				document.getElementById('clock').textContent = new Date().toLocaleTimeString('en-US', { hour12: false })
			}, 1000)

			function pad(num) {
				return num.toString().padStart(3, '0')
			}

			function initGame() {
				clearInterval(timerInterval)
				secondsElapsed = 0
				timerEl.textContent = '000'
				isGameOver = false
				isFirstClick = true
				revealedCount = 0
				grid = []
				boardEl.innerHTML = ''
				statusIndicator.style.backgroundColor = 'var(--primary)'
				statusIndicator.style.boxShadow = '0 0 10px var(--primary)'

				currentConfig = difficulties[difficultySelect.value]
				minesLeft = currentConfig.mines
				mineCounterEl.textContent = pad(minesLeft)

				log(`加载${difficultySelect.options[difficultySelect.selectedIndex].text}配置矩阵...`)

				// Setup CSS Grid
				boardEl.style.gridTemplateColumns = `repeat(${currentConfig.cols}, 1fr)`
				boardEl.style.gridTemplateRows = `repeat(${currentConfig.rows}, 1fr)`

				// Create Grid Data & DOM
				for (let r = 0; r < currentConfig.rows; r++) {
					const row = []
					for (let c = 0; c < currentConfig.cols; c++) {
						const cell = {
							r,
							c,
							isMine: false,
							isRevealed: false,
							isFlagged: false,
							neighborMines: 0,
							element: document.createElement('div')
						}

						cell.element.className = 'cell'
						cell.element.dataset.r = r
						cell.element.dataset.c = c

						// Events
						cell.element.addEventListener('mousedown', e => handleCellClick(e, r, c))

						boardEl.appendChild(cell.element)
						row.push(cell)
					}
					grid.push(row)
				}
				log('矩阵挂载完毕。开始扫描。')
			}

			function placeMines(firstR, firstC) {
				let placed = 0
				while (placed < currentConfig.mines) {
					let r = Math.floor(Math.random() * currentConfig.rows)
					let c = Math.floor(Math.random() * currentConfig.cols)

					// Don't place on first click or already placed
					// Prevent placing in 3x3 area around first click to guarantee opening
					if (!grid[r][c].isMine && Math.max(Math.abs(r - firstR), Math.abs(c - firstC)) > 1) {
						grid[r][c].isMine = true
						placed++
					}
				}
				calculateNeighbors()
			}

			function calculateNeighbors() {
				for (let r = 0; r < currentConfig.rows; r++) {
					for (let c = 0; c < currentConfig.cols; c++) {
						if (grid[r][c].isMine) continue
						let count = 0
						getNeighbors(r, c).forEach(n => {
							if (n.isMine) count++
						})
						grid[r][c].neighborMines = count
					}
				}
			}

			function getNeighbors(r, c) {
				const neighbors = []
				for (let i = -1; i <= 1; i++) {
					for (let j = -1; j <= 1; j++) {
						if (i === 0 && j === 0) continue
						let nr = r + i,
							nc = c + j
						if (nr >= 0 && nr < currentConfig.rows && nc >= 0 && nc < currentConfig.cols) {
							neighbors.push(grid[nr][nc])
						}
					}
				}
				return neighbors
			}

			function handleCellClick(e, r, c) {
				if (isGameOver) return
				const cell = grid[r][c]

				// Right click or Long press (Flagging)
				if (e.button === 2 || e.ctrlKey || e.altKey) {
					if (!cell.isRevealed) {
						cell.isFlagged = !cell.isFlagged
						cell.element.classList.toggle('flagged')
						cell.element.textContent = cell.isFlagged ? '⚑' : ''
						minesLeft += cell.isFlagged ? -1 : 1
						mineCounterEl.textContent = pad(minesLeft)
					}
					return
				}

				// Left Click (Reveal)
				if (e.button === 0) {
					if (cell.isFlagged || cell.isRevealed) return

					if (isFirstClick) {
						placeMines(r, c)
						startTimer()
						isFirstClick = false
					}

					if (cell.isMine) {
						gameOver(cell)
					} else {
						revealCell(cell)
						checkWin()
					}
				}
			}

			function revealCell(cell) {
				if (cell.isRevealed || cell.isFlagged) return

				cell.isRevealed = true
				cell.element.classList.add('revealed')
				revealedCount++

				if (cell.neighborMines > 0) {
					cell.element.textContent = cell.neighborMines
					cell.element.dataset.num = cell.neighborMines
				} else {
					// Flood fill for 0
					getNeighbors(cell.r, cell.c).forEach(n => revealCell(n))
				}
			}

			function startTimer() {
				timerInterval = setInterval(() => {
					secondsElapsed++
					timerEl.textContent = pad(Math.min(secondsElapsed, 999))
				}, 1000)
			}

			function gameOver(detonatedCell) {
				isGameOver = true
				clearInterval(timerInterval)
				statusIndicator.style.backgroundColor = 'var(--danger)'
				statusIndicator.style.boxShadow = '0 0 10px var(--danger)'

				log('严重错误：触发高爆协议！连接中断。', 'warn')

				// Reveal all mines
				for (let r = 0; r < currentConfig.rows; r++) {
					for (let c = 0; c < currentConfig.cols; c++) {
						let cell = grid[r][c]
						if (cell.isMine) {
							cell.element.classList.add('revealed', 'mine')
							cell.element.textContent = '✖'
							if (cell === detonatedCell) {
								cell.element.classList.add('exploded')
							}
						} else if (cell.isFlagged) {
							// Wrong flag
							cell.element.style.color = '#F472B6'
							cell.element.style.textDecoration = 'line-through'
						}
					}
				}
			}

			function checkWin() {
				const totalSafeCells = currentConfig.rows * currentConfig.cols - currentConfig.mines
				if (revealedCount === totalSafeCells) {
					isGameOver = true
					clearInterval(timerInterval)
					minesLeft = 0
					mineCounterEl.textContent = pad(0)
					log(`扇区清理完毕。耗时：${secondsElapsed}秒。干得漂亮，特工。`, 'success')

					// Flag remaining mines automatically
					grid.forEach(row =>
						row.forEach(cell => {
							if (cell.isMine && !cell.isFlagged) {
								cell.element.classList.add('flagged')
								cell.element.textContent = '⚑'
							}
						})
					)
				}
			}

			// Init on load
			initGame()
		</script>
	</body>
</html>
