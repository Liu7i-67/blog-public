<!doctype html>
<html lang="zh-CN">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<title>贪吃蛇 // 赛博朋克</title>
		<link rel="icon" href="/favicon.png" />
		<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Noto+Sans+SC:wght@700&display=swap" rel="stylesheet" />
		<style>
			:root {
				--bg-color: #050505;
				--grid-color: rgba(0, 255, 255, 0.04);
				--neon-primary: #00ffff; /* Cyan */
				--neon-secondary: #ff00ff; /* Magenta */
				--text-color: #e0e0e0;
			}

			body {
				margin: 0;
				min-height: 100vh;
				display: flex;
				flex-direction: column;
				align-items: center;
				justify-content: center;
				background-color: var(--bg-color);
				background-image: linear-gradient(var(--grid-color) 1px, transparent 1px), linear-gradient(90deg, var(--grid-color) 1px, transparent 1px);
				background-size: 30px 30px;
				background-position: center center;
				color: var(--text-color);
				font-family: 'Share Tech Mono', 'Noto Sans SC', monospace;
				overflow: hidden;
				user-select: none;
			}

			/* CRT Scanlines overlay */
			body::before {
				content: '';
				position: absolute;
				top: 0;
				left: 0;
				width: 100vw;
				height: 100vh;
				background: linear-gradient(to bottom, rgba(255, 255, 255, 0), rgba(255, 255, 255, 0) 50%, rgba(0, 0, 0, 0.15) 50%, rgba(0, 0, 0, 0.15));
				background-size: 100% 4px;
				pointer-events: none;
				z-index: 50;
			}

			/* CRT Vignette */
			body::after {
				content: '';
				position: absolute;
				top: 0;
				left: 0;
				width: 100vw;
				height: 100vh;
				background: radial-gradient(circle, rgba(0, 0, 0, 0) 50%, rgba(0, 0, 0, 0.8) 100%);
				pointer-events: none;
				z-index: 51;
			}

			#app-container {
				position: relative;
				z-index: 10;
				display: flex;
				flex-direction: column;
				align-items: center;
				gap: 25px;
				animation: bootSequence 1.5s ease-out forwards;
			}

			@keyframes bootSequence {
				0% {
					opacity: 0;
					transform: scale(0.9) translateY(20px);
					filter: contrast(2) brightness(0);
				}
				20% {
					opacity: 1;
					filter: contrast(1.5) brightness(1.2);
				}
				25% {
					opacity: 0.8;
				}
				30% {
					opacity: 1;
				}
				100% {
					opacity: 1;
					transform: scale(1) translateY(0);
					filter: contrast(1) brightness(1);
				}
			}

			header {
				text-align: center;
				position: relative;
			}

			h1 {
				margin: 0 0 15px 0;
				font-size: 3rem;
				color: #fff;
				text-transform: uppercase;
				letter-spacing: 8px;
				text-shadow:
					0 0 5px #fff,
					0 0 10px #fff,
					0 0 20px var(--neon-primary),
					0 0 40px var(--neon-primary);
				animation: flicker 4s infinite;
			}

			@keyframes flicker {
				0%,
				19%,
				21%,
				23%,
				25%,
				54%,
				56%,
				100% {
					text-shadow:
						0 0 5px #fff,
						0 0 10px #fff,
						0 0 20px var(--neon-primary),
						0 0 40px var(--neon-primary);
					opacity: 1;
				}
				20%,
				24%,
				55% {
					text-shadow: none;
					opacity: 0.5;
				}
			}

			.scoreboard {
				display: flex;
				gap: 50px;
				background: rgba(0, 255, 255, 0.03);
				border: 1px solid rgba(0, 255, 255, 0.2);
				padding: 12px 40px;
				border-radius: 2px;
				box-shadow: inset 0 0 15px rgba(0, 255, 255, 0.05);
				position: relative;
			}

			/* Decorative brackets for scoreboard */
			.scoreboard::before,
			.scoreboard::after {
				content: '';
				position: absolute;
				top: -5px;
				bottom: -5px;
				width: 10px;
				border: 2px solid var(--neon-primary);
			}
			.scoreboard::before {
				left: -5px;
				border-right: none;
			}
			.scoreboard::after {
				right: -5px;
				border-left: none;
			}

			.score-box {
				display: flex;
				flex-direction: column;
				align-items: center;
			}

			.score-label {
				font-size: 0.8rem;
				color: rgba(255, 255, 255, 0.5);
				text-transform: uppercase;
				letter-spacing: 3px;
				margin-bottom: 5px;
				font-weight: bold;
			}

			.score-value {
				font-size: 2rem;
				color: #fff;
				text-shadow: 0 0 10px var(--neon-primary);
				font-weight: bold;
			}

			.score-value.high {
				color: var(--neon-secondary);
				text-shadow: 0 0 10px var(--neon-secondary);
			}

			.canvas-container {
				position: relative;
				padding: 15px;
				border: 1px solid rgba(0, 255, 255, 0.1);
				background: rgba(0, 0, 0, 0.8);
				box-shadow:
					0 0 30px rgba(0, 255, 255, 0.05),
					inset 0 0 30px rgba(0, 255, 255, 0.05);
			}

			/* Corner accents for canvas */
			.corner {
				position: absolute;
				width: 15px;
				height: 15px;
				border: 2px solid var(--neon-primary);
			}
			.corner.tl {
				top: -2px;
				left: -2px;
				border-right: none;
				border-bottom: none;
			}
			.corner.tr {
				top: -2px;
				right: -2px;
				border-left: none;
				border-bottom: none;
			}
			.corner.bl {
				bottom: -2px;
				left: -2px;
				border-right: none;
				border-top: none;
			}
			.corner.br {
				bottom: -2px;
				right: -2px;
				border-left: none;
				border-top: none;
			}

			canvas {
				display: block;
				background-color: #020202;
				box-shadow: 0 0 10px rgba(0, 0, 0, 1);
			}

			.controls {
				color: rgba(255, 255, 255, 0.4);
				font-size: 0.9rem;
				letter-spacing: 2px;
				display: flex;
				gap: 25px;
				text-transform: uppercase;
				font-weight: bold;
			}

			.key {
				color: var(--neon-primary);
				background: rgba(0, 255, 255, 0.05);
				padding: 4px 8px;
				border-radius: 2px;
				border: 1px solid rgba(0, 255, 255, 0.2);
				text-shadow: 0 0 5px rgba(0, 255, 255, 0.5);
				font-family: 'Share Tech Mono', monospace;
			}
		</style>
	</head>
	<body>
		<div id="app-container">
			<header>
				<h1>SNAKE_OS</h1>
				<div class="scoreboard">
					<div class="score-box">
						<span class="score-label">当前得分</span>
						<span class="score-value" id="score">000</span>
					</div>
					<div class="score-box">
						<span class="score-label">最高得分</span>
						<span class="score-value high" id="high-score">000</span>
					</div>
				</div>
			</header>

			<div class="canvas-container">
				<div class="corner tl"></div>
				<div class="corner tr"></div>
				<div class="corner bl"></div>
				<div class="corner br"></div>
				<canvas id="gameCanvas" width="400" height="400"></canvas>
			</div>

			<div class="controls">
				<span>使用 [<span class="key">W A S D</span>] 或 [<span class="key">方向键</span>] 移动</span>
				<span>按 [<span class="key">空格键</span>] 重启系统</span>
			</div>
		</div>

		<script>
			const canvas = document.getElementById('gameCanvas')
			const ctx = canvas.getContext('2d')
			const scoreElement = document.getElementById('score')
			const highScoreElement = document.getElementById('high-score')

			const gridSize = 20
			const tileCount = canvas.width / gridSize

			let snake = []
			let dx = 0
			let dy = 0
			let food = { x: 0, y: 0 }
			let score = 0
			let highScore = localStorage.getItem('snakeHighScore') || 0
			let gameLoop
			let isGameOver = false

			// Format score to 3 digits
			const formatScore = s => s.toString().padStart(3, '0')

			highScoreElement.innerText = formatScore(highScore)

			function initGame() {
				snake = [
					{ x: 10, y: 10 },
					{ x: 9, y: 10 },
					{ x: 8, y: 10 }
				] // Start with length 3
				dx = 1 // Start moving right
				dy = 0
				score = 0
				scoreElement.innerText = formatScore(score)
				isGameOver = false
				spawnFood()
				if (gameLoop) clearInterval(gameLoop)
				gameLoop = setInterval(update, 100) // Slightly faster
				draw()
			}

			function update() {
				if (isGameOver) return

				const head = { x: snake[0].x + dx, y: snake[0].y + dy }

				// Wall collision
				if (head.x < 0 || head.x >= tileCount || head.y < 0 || head.y >= tileCount) {
					return handleGameOver()
				}

				// Self collision
				for (let i = 0; i < snake.length; i++) {
					if (head.x === snake[i].x && head.y === snake[i].y) {
						return handleGameOver()
					}
				}

				snake.unshift(head)

				// Food collision
				if (head.x === food.x && head.y === food.y) {
					score += 10
					scoreElement.innerText = formatScore(score)
					if (score > highScore) {
						highScore = score
						highScoreElement.innerText = formatScore(highScore)
						localStorage.setItem('snakeHighScore', highScore)
					}
					spawnFood()
				} else {
					snake.pop()
				}

				draw()
			}

			function draw() {
				// Background
				ctx.fillStyle = '#020202'
				ctx.fillRect(0, 0, canvas.width, canvas.height)

				// Grid lines
				ctx.strokeStyle = 'rgba(0, 255, 255, 0.05)'
				ctx.lineWidth = 1
				for (let i = 0; i <= canvas.width; i += gridSize) {
					ctx.beginPath()
					ctx.moveTo(i, 0)
					ctx.lineTo(i, canvas.height)
					ctx.stroke()
					ctx.beginPath()
					ctx.moveTo(0, i)
					ctx.lineTo(canvas.width, i)
					ctx.stroke()
				}

				// Draw Food (Glowing Diamond)
				const fx = food.x * gridSize + gridSize / 2
				const fy = food.y * gridSize + gridSize / 2
				ctx.shadowBlur = 15
				ctx.shadowColor = '#ff00ff'
				ctx.fillStyle = '#ff00ff'

				ctx.beginPath()
				ctx.moveTo(fx, fy - gridSize / 2 + 4)
				ctx.lineTo(fx + gridSize / 2 - 4, fy)
				ctx.lineTo(fx, fy + gridSize / 2 - 4)
				ctx.lineTo(fx - gridSize / 2 + 4, fy)
				ctx.fill()

				// Draw Snake
				snake.forEach((part, index) => {
					const px = part.x * gridSize
					const py = part.y * gridSize

					if (index === 0) {
						// Head: Bright white core with cyan glow
						ctx.shadowBlur = 15
						ctx.shadowColor = '#00ffff'
						ctx.fillStyle = '#ffffff'
					} else {
						// Body: Fading cyan trail
						ctx.shadowBlur = 10
						ctx.shadowColor = '#00ffff'
						const opacity = Math.max(0.2, 1 - (index / snake.length) * 0.8)
						ctx.fillStyle = `rgba(0, 255, 255, ${opacity})`
					}

					// Draw smaller segment for futuristic segmented look
					ctx.fillRect(px + 2, py + 2, gridSize - 4, gridSize - 4)
				})

				ctx.shadowBlur = 0 // Reset shadow

				if (isGameOver) {
					ctx.fillStyle = 'rgba(0, 0, 0, 0.85)'
					ctx.fillRect(0, 0, canvas.width, canvas.height)

					ctx.shadowBlur = 20
					ctx.shadowColor = '#ff00ff'
					ctx.fillStyle = '#ff00ff'
					ctx.font = 'bold 36px "Noto Sans SC", "Share Tech Mono"'
					ctx.textAlign = 'center'
					ctx.textBaseline = 'middle'
					ctx.fillText('系统故障', canvas.width / 2, canvas.height / 2 - 25)

					ctx.shadowBlur = 10
					ctx.shadowColor = '#00ffff'
					ctx.fillStyle = '#00ffff'
					ctx.font = 'bold 16px "Noto Sans SC", "Share Tech Mono"'
					ctx.fillText('按 [空格键] 重启系统', canvas.width / 2, canvas.height / 2 + 25)
					ctx.shadowBlur = 0
				}
			}

			function spawnFood() {
				let validLocation = false
				while (!validLocation) {
					food.x = Math.floor(Math.random() * tileCount)
					food.y = Math.floor(Math.random() * tileCount)
					validLocation = true
					for (let part of snake) {
						if (part.x === food.x && part.y === food.y) {
							validLocation = false
							break
						}
					}
				}
			}

			function handleGameOver() {
				isGameOver = true
				clearInterval(gameLoop)
				draw()
			}

			document.addEventListener('keydown', e => {
				const key = e.key.toLowerCase()
				if (['arrowup', 'arrowdown', 'arrowleft', 'arrowright', ' ', 'w', 'a', 's', 'd'].includes(key)) {
					e.preventDefault()
				}

				if (isGameOver && key === ' ') {
					initGame()
					return
				}

				// Prevent 180-degree turns
				if ((key === 'arrowup' || key === 'w') && dy === 0) {
					dx = 0
					dy = -1
				} else if ((key === 'arrowdown' || key === 's') && dy === 0) {
					dx = 0
					dy = 1
				} else if ((key === 'arrowleft' || key === 'a') && dx === 0) {
					dx = -1
					dy = 0
				} else if ((key === 'arrowright' || key === 'd') && dx === 0) {
					dx = 1
					dy = 0
				}
			})

			// Start
			initGame()
		</script>
	</body>
</html>
