<!doctype html>
<html lang="zh-CN">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
		<title>切削协议 // BLADE_PROTOCOL</title>
		<link rel="icon" href="/favicon.png" />
		<link rel="preconnect" href="https://fonts.googleapis.com" />
		<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
		<link
			href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Noto+Sans+SC:wght@700;900&family=Bebas+Neue&display=swap"
			rel="stylesheet" />
		<style>
			:root {
				--bg-dark: #121212;
				--ink: #000000;
				--white: #ffffff;
				--accent-red: #ff2a2a; /* Bombs / UI */
				--fruit-1: #ffeb3b; /* Yellow - Banana */
				--fruit-2: #4caf50; /* Green - Watermelon */
				--fruit-3: #ff9800; /* Orange - Orange */
				--fruit-4: #e91e63; /* Pink - Peach */
				--blade-color: #00ffff; /* Cyan */
			}

			* {
				box-sizing: border-box;
				margin: 0;
				padding: 0;
				user-select: none;
				-webkit-user-drag: none;
				touch-action: none;
			}

			body {
				background-color: var(--bg-dark);
				color: var(--white);
				font-family: 'DM Mono', 'Noto Sans SC', monospace;
				height: 100vh;
				display: flex;
				justify-content: center;
				align-items: center;
				overflow: hidden;
				/* Heavy Halftone background */
				background-image: radial-gradient(circle, #333 2px, transparent 2px);
				background-size: 16px 16px;
			}

			.game-container {
				position: relative;
				width: 100%;
				height: 100%;
				max-width: 600px; /* Mobile focused ratio */
				background: var(--bg-dark);
				border-left: 4px solid var(--white);
				border-right: 4px solid var(--white);
				overflow: hidden;
			}

			/* Abstract geometrical background details */
			.game-container::before {
				content: '';
				position: absolute;
				top: -20%;
				left: -20%;
				width: 140%;
				height: 140%;
				background: conic-gradient(from 90deg at 50% 50%, rgba(255, 255, 255, 0.02) 0%, transparent 50%, rgba(255, 255, 255, 0.02) 100%);
				animation: spin 20s linear infinite;
				pointer-events: none;
				z-index: 0;
			}
			@keyframes spin {
				100% {
					transform: rotate(360deg);
				}
			}

			canvas {
				display: block;
				width: 100%;
				height: 100%;
				position: absolute;
				top: 0;
				left: 0;
				z-index: 5;
				cursor: crosshair;
			}

			/* HUD */
			.hud {
				position: absolute;
				top: 0;
				left: 0;
				right: 0;
				padding: 20px;
				display: flex;
				justify-content: space-between;
				align-items: flex-start;
				z-index: 10;
				pointer-events: none;
			}

			.score-block {
				display: flex;
				flex-direction: column;
			}

			.hud-label {
				font-size: 0.8rem;
				text-transform: uppercase;
				letter-spacing: 2px;
				color: #888;
				margin-bottom: 2px;
				font-weight: 700;
			}

			.score-value {
				font-family: 'Bebas Neue', sans-serif;
				font-size: 3.5rem;
				line-height: 0.8;
				color: var(--white);
				text-shadow: 4px 4px 0px var(--accent-red);
			}

			.lives-container {
				display: flex;
				gap: 8px;
			}

			.life-icon {
				width: 24px;
				height: 24px;
				background: var(--accent-red);
				border: 2px solid var(--white);
				transform: rotate(45deg);
				transition: all 0.3s;
			}

			.life-icon.lost {
				background: transparent;
				border-color: #555;
				transform: rotate(45deg) scale(0.5);
			}

			/* Overlays */
			.overlay {
				position: absolute;
				inset: 0;
				background: rgba(18, 18, 18, 0.95);
				backdrop-filter: blur(10px);
				z-index: 20;
				display: flex;
				flex-direction: column;
				justify-content: center;
				align-items: center;
				text-align: center;
				opacity: 0;
				pointer-events: none;
				transition: opacity 0.3s;
			}

			.overlay.active {
				opacity: 1;
				pointer-events: auto;
			}

			.overlay h1 {
				font-family: 'Noto Sans SC', sans-serif;
				font-size: 4rem;
				font-weight: 900;
				letter-spacing: 10px;
				color: var(--white);
				text-shadow: 6px 6px 0px var(--accent-red);
				margin-bottom: 10px;
				text-transform: uppercase;
			}

			.overlay p {
				font-size: 1rem;
				color: #aaa;
				margin-bottom: 40px;
				max-width: 80%;
				line-height: 1.6;
			}

			.btn {
				background: var(--white);
				color: var(--ink);
				border: none;
				padding: 15px 40px;
				font-family: 'Noto Sans SC', sans-serif;
				font-weight: 900;
				font-size: 1.5rem;
				cursor: pointer;
				box-shadow: 8px 8px 0px var(--accent-red);
				transition: all 0.1s;
				text-transform: uppercase;
			}

			.btn:hover {
				transform: translate(2px, 2px);
				box-shadow: 6px 6px 0px var(--accent-red);
			}

			.btn:active {
				transform: translate(8px, 8px);
				box-shadow: 0px 0px 0px var(--accent-red);
			}

			.final-score {
				font-family: 'Bebas Neue', sans-serif;
				font-size: 6rem;
				color: var(--white);
				margin: 20px 0;
				line-height: 1;
			}

			/* Flash Effects */
			.flash {
				position: absolute;
				inset: 0;
				background: var(--white);
				z-index: 15;
				pointer-events: none;
				opacity: 0;
				transition: opacity 0.1s;
			}

			.flash.red {
				background: var(--accent-red);
			}
			.flash.active {
				opacity: 0.8;
			}
		</style>
	</head>
	<body>
		<div class="game-container">
			<div class="hud">
				<div class="score-block">
					<span class="hud-label">得分</span>
					<span class="score-value" id="score">0</span>
				</div>
				<div class="score-block" style="align-items: flex-end">
					<span class="hud-label">核心容错</span>
					<div class="lives-container" id="lives">
						<div class="life-icon"></div>
						<div class="life-icon"></div>
						<div class="life-icon"></div>
					</div>
				</div>
			</div>

			<div class="flash" id="flash"></div>

			<canvas id="gameCanvas"></canvas>

			<div class="overlay active" id="startScreen">
				<h1>切削协议</h1>
				<p>滑动屏幕或鼠标切碎所有几何几何数据体。警告：切勿触碰带有黑色核心的红色爆雷。</p>
				<button class="btn" onclick="startGame()">启动协议</button>
			</div>

			<div class="overlay" id="gameOverScreen">
				<h1 style="color: var(--accent-red); text-shadow: 6px 6px 0px var(--white)">协议终止</h1>
				<div class="hud-label">最终清理数据</div>
				<div class="final-score" id="finalScore">0</div>
				<button class="btn" onclick="startGame()">重新校准</button>
			</div>
		</div>

		<script>
			const canvas = document.getElementById('gameCanvas')
			const ctx = canvas.getContext('2d')
			const scoreEl = document.getElementById('score')
			const livesEl = document.getElementById('lives')
			const startScreen = document.getElementById('startScreen')
			const gameOverScreen = document.getElementById('gameOverScreen')
			const finalScoreEl = document.getElementById('finalScore')
			const flashEl = document.getElementById('flash')

			function resize() {
				canvas.width = canvas.parentElement.clientWidth
				canvas.height = canvas.parentElement.clientHeight
			}
			window.addEventListener('resize', resize)
			resize()

			// Game State
			let state = 'start'
			let score = 0
			let lives = 3
			let frame = 0
			let animationId

			// Entities
			let targets = []
			let particles = []
			let slices = []

			// Input
			let isDrawing = false
			let mousePos = { x: 0, y: 0 }
			let lastMousePos = { x: 0, y: 0 }
			let points = [] // Trail points

			// Colors mapping for "fruits"
			const colors = ['#FFEB3B', '#4CAF50', '#FF9800', '#E91E63']

			// Input Handling
			function startDraw(x, y) {
				if (state !== 'play') return
				isDrawing = true
				mousePos = { x, y }
				lastMousePos = { x, y }
				points = [{ x, y, age: 0 }]
			}

			function moveDraw(x, y) {
				if (!isDrawing || state !== 'play') return
				lastMousePos = { ...mousePos }
				mousePos = { x, y }
				points.push({ x, y, age: 0 })
				if (points.length > 15) points.shift() // Max trail length

				checkCuts()
			}

			function endDraw() {
				isDrawing = false
				points = []
			}

			canvas.addEventListener('mousedown', e => startDraw(e.offsetX, e.offsetY))
			canvas.addEventListener('mousemove', e => moveDraw(e.offsetX, e.offsetY))
			window.addEventListener('mouseup', endDraw)

			canvas.addEventListener(
				'touchstart',
				e => {
					e.preventDefault()
					const rect = canvas.getBoundingClientRect()
					startDraw(e.touches[0].clientX - rect.left, e.touches[0].clientY - rect.top)
				},
				{ passive: false }
			)

			canvas.addEventListener(
				'touchmove',
				e => {
					e.preventDefault()
					const rect = canvas.getBoundingClientRect()
					moveDraw(e.touches[0].clientX - rect.left, e.touches[0].clientY - rect.top)
				},
				{ passive: false }
			)

			window.addEventListener('touchend', endDraw)

			// Core Mechanics
			function startGame() {
				state = 'play'
				score = 0
				lives = 3
				frame = 0
				targets = []
				particles = []
				slices = []
				points = []

				scoreEl.textContent = score
				updateLivesUI()

				startScreen.classList.remove('active')
				gameOverScreen.classList.remove('active')

				if (animationId) cancelAnimationFrame(animationId)
				loop()
			}

			function updateLivesUI() {
				const icons = livesEl.children
				for (let i = 0; i < 3; i++) {
					if (i < lives) icons[i].classList.remove('lost')
					else icons[i].classList.add('lost')
				}
			}

			function loseLife() {
				lives--
				updateLivesUI()

				flashEl.className = 'flash red active'
				setTimeout(() => (flashEl.className = 'flash red'), 100)

				if (lives <= 0) {
					gameOver()
				}
			}

			function gameOver() {
				state = 'gameover'
				finalScoreEl.textContent = score
				gameOverScreen.classList.add('active')
			}

			function spawnTarget() {
				// Difficulty curve
				const freq = Math.max(30, 90 - Math.floor(score / 10))

				if (frame % freq === 0) {
					const count = Math.floor(Math.random() * 3) + 1 // Spawn 1-3 targets at once
					for (let i = 0; i < count; i++) {
						const isBomb = Math.random() < 0.15 && score > 50 // 15% bomb chance after 50 score
						const x = Math.random() * (canvas.width - 100) + 50

						targets.push({
							id: Math.random().toString(),
							x: x,
							y: canvas.height + 50,
							vx: (canvas.width / 2 - x) * 0.01 + (Math.random() - 0.5) * 4,
							vy: -(Math.random() * 6 + 14), // Upward force
							radius: isBomb ? 25 : Math.random() * 15 + 25,
							type: isBomb ? 'bomb' : 'fruit',
							color: isBomb ? '#FF2A2A' : colors[Math.floor(Math.random() * colors.length)],
							angle: 0,
							vAngle: (Math.random() - 0.5) * 0.2,
							cut: false
						})
					}
				}
			}

			function createParticles(x, y, color, count = 15) {
				for (let i = 0; i < count; i++) {
					const a = Math.random() * Math.PI * 2
					const v = Math.random() * 6 + 2
					particles.push({
						x,
						y,
						vx: Math.cos(a) * v,
						vy: Math.sin(a) * v,
						life: 1,
						decay: Math.random() * 0.03 + 0.02,
						color,
						size: Math.random() * 8 + 4
					})
				}
			}

			function createSlices(target, angle) {
				// Create two halves
				const offset = 5
				const dx = Math.cos(angle + Math.PI / 2) * offset
				const dy = Math.sin(angle + Math.PI / 2) * offset

				for (let i = -1; i <= 1; i += 2) {
					slices.push({
						x: target.x + dx * i,
						y: target.y + dy * i,
						vx: target.vx + dx * i * 0.5,
						vy: target.vy + dy * i * 0.5,
						radius: target.radius,
						color: target.color,
						angle: target.angle,
						vAngle: target.vAngle + i * 0.1,
						cutAngle: angle,
						half: i // 1 or -1
					})
				}
			}

			// Line intersection logic
			function distToSegmentSquared(p, v, w) {
				let l2 = Math.pow(v.x - w.x, 2) + Math.pow(v.y - w.y, 2)
				if (l2 === 0) return Math.pow(p.x - v.x, 2) + Math.pow(p.y - v.y, 2)
				let t = ((p.x - v.x) * (w.x - v.x) + (p.y - v.y) * (w.y - v.y)) / l2
				t = Math.max(0, Math.min(1, t))
				return Math.pow(p.x - (v.x + t * (w.x - v.x)), 2) + Math.pow(p.y - (v.y + t * (w.y - v.y)), 2)
			}

			function checkCuts() {
				if (points.length < 2) return
				const p1 = points[points.length - 2]
				const p2 = points[points.length - 1]

				// Calculate cut angle
				const cutAngle = Math.atan2(p2.y - p1.y, p2.x - p1.x)

				for (let i = targets.length - 1; i >= 0; i--) {
					let t = targets[i]
					if (t.cut) continue

					// Check distance from target center to cut line segment
					const distSq = distToSegmentSquared(t, p1, p2)

					if (distSq < t.radius * t.radius) {
						t.cut = true

						if (t.type === 'bomb') {
							// Explode bomb
							createParticles(t.x, t.y, t.color, 40)
							flashEl.className = 'flash active'
							setTimeout(() => (flashEl.className = 'flash'), 150)
							loseLife() // Bomb penalty
							targets.splice(i, 1)
						} else {
							// Cut fruit
							score += 10
							scoreEl.textContent = score
							createParticles(t.x, t.y, t.color)
							createSlices(t, cutAngle)
							targets.splice(i, 1)
						}
					}
				}
			}

			function update() {
				frame++
				spawnTarget()

				// Update trail
				for (let i = 0; i < points.length; i++) {
					points[i].age++
				}
				// Remove old points
				points = points.filter(p => p.age < 10)

				// Gravity
				const g = 0.4

				// Update targets
				for (let i = targets.length - 1; i >= 0; i--) {
					let t = targets[i]
					t.x += t.vx
					t.y += t.vy
					t.vy += g
					t.angle += t.vAngle

					// Off screen (fell down)
					if (t.y > canvas.height + t.radius && t.vy > 0) {
						if (t.type === 'fruit' && !t.cut) {
							loseLife() // Drop penalty
						}
						targets.splice(i, 1)
					}
				}

				// Update slices
				for (let i = slices.length - 1; i >= 0; i--) {
					let s = slices[i]
					s.x += s.vx
					s.y += s.vy
					s.vy += g
					s.angle += s.vAngle

					if (s.y > canvas.height + s.radius) {
						slices.splice(i, 1)
					}
				}

				// Update particles
				for (let i = particles.length - 1; i >= 0; i--) {
					let p = particles[i]
					p.x += p.vx
					p.y += p.vy
					p.vy += 0.2 // slight gravity for liquid
					p.life -= p.decay

					if (p.life <= 0) particles.splice(i, 1)
				}
			}

			// Draw Brutalist Shapes
			function drawShape(x, y, r, angle, color, type) {
				ctx.save()
				ctx.translate(x, y)
				ctx.rotate(angle)

				ctx.fillStyle = color
				ctx.strokeStyle = '#fff'
				ctx.lineWidth = 4

				ctx.beginPath()
				if (type === 'bomb') {
					// Octagon bomb
					for (let i = 0; i < 8; i++) {
						const a = ((Math.PI * 2) / 8) * i
						ctx.lineTo(Math.cos(a) * r, Math.sin(a) * r)
					}
					ctx.closePath()
					ctx.fill()
					ctx.stroke()

					// Bomb core
					ctx.fillStyle = '#000'
					ctx.beginPath()
					ctx.arc(0, 0, r * 0.4, 0, Math.PI * 2)
					ctx.fill()
				} else {
					// Brutalist diamond / distorted square for fruit
					ctx.moveTo(0, -r)
					ctx.lineTo(r, 0)
					ctx.lineTo(0, r)
					ctx.lineTo(-r, 0)
					ctx.closePath()

					// Add hard shadow logic by translating
					ctx.shadowColor = '#000'
					ctx.shadowBlur = 0
					ctx.shadowOffsetX = 4
					ctx.shadowOffsetY = 4

					ctx.fill()

					ctx.shadowColor = 'transparent' // reset for stroke
					ctx.stroke()

					// Inner geometric detail
					ctx.strokeStyle = '#000'
					ctx.lineWidth = 2
					ctx.strokeRect(-r * 0.2, -r * 0.2, r * 0.4, r * 0.4)
				}

				ctx.restore()
			}

			function drawHalfShape(slice) {
				ctx.save()
				ctx.translate(slice.x, slice.y)
				ctx.rotate(slice.cutAngle) // Align to cut angle

				// Clip half
				ctx.beginPath()
				if (slice.half === 1) {
					ctx.rect(-slice.radius * 2, 0, slice.radius * 4, slice.radius * 2)
				} else {
					ctx.rect(-slice.radius * 2, -slice.radius * 2, slice.radius * 4, slice.radius * 2)
				}
				ctx.clip()

				// Rotate back internal angle to draw original shape
				ctx.rotate(slice.angle - slice.cutAngle)

				ctx.fillStyle = slice.color
				ctx.strokeStyle = '#fff'
				ctx.lineWidth = 4

				ctx.beginPath()
				ctx.moveTo(0, -slice.radius)
				ctx.lineTo(slice.radius, 0)
				ctx.lineTo(0, slice.radius)
				ctx.lineTo(-slice.radius, 0)
				ctx.closePath()
				ctx.fill()
				ctx.stroke()

				// Internal splash color
				ctx.fillStyle = '#fff'
				ctx.globalAlpha = 0.5
				ctx.fill()
				ctx.globalAlpha = 1.0

				ctx.restore()
			}

			function draw() {
				ctx.clearRect(0, 0, canvas.width, canvas.height)

				// Draw Targets
				for (let t of targets) {
					drawShape(t.x, t.y, t.radius, t.angle, t.color, t.type)
				}

				// Draw Slices
				for (let s of slices) {
					drawHalfShape(s)
				}

				// Draw Particles (Square splatters)
				for (let p of particles) {
					if (p.life <= 0) continue
					ctx.fillStyle = p.color
					ctx.globalAlpha = Math.max(0, p.life)
					ctx.fillRect(p.x - p.size / 2, p.y - p.size / 2, p.size, p.size)
				}
				ctx.globalAlpha = 1.0

				// Draw Blade Trail
				if (points.length > 1) {
					ctx.beginPath()
					ctx.moveTo(points[0].x, points[0].y)
					for (let i = 1; i < points.length; i++) {
						ctx.lineTo(points[i].x, points[i].y)
					}

					ctx.strokeStyle = 'var(--blade-color)'
					ctx.lineWidth = 6
					ctx.lineCap = 'round'
					ctx.lineJoin = 'round'
					ctx.shadowColor = 'var(--blade-color)'
					ctx.shadowBlur = 15
					ctx.stroke()

					// Inner white core
					ctx.strokeStyle = '#fff'
					ctx.lineWidth = 2
					ctx.shadowBlur = 0
					ctx.stroke()
				}
			}

			function loop() {
				if (state === 'play') {
					update()
					draw()
					animationId = requestAnimationFrame(loop)
				} else {
					// Keep drawing static frame when game over
					draw()
				}
			}

			// Initial draw
			draw()
		</script>
	</body>
</html>
