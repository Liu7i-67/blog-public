<!doctype html>
<html lang="zh">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<title>数独 // 粗野主义</title>
		<link rel="icon" href="/favicon.png" />
		<link rel="preconnect" href="https://fonts.googleapis.com" />
		<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
		<link
			href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=JetBrains+Mono:wght@400;700;800&family=Noto+Sans+SC:wght@700;900&display=swap"
			rel="stylesheet" />
		<style>
			:root {
				--bg: #f0eee9;
				--ink: #111111;
				--primary: #ff3e00;
				--secondary: #ffd500;
				--highlight: #00e5ff;
				--peer: #e0dec8;
				--user-ink: #0047ff;
				--error: #ff0055;
				--shadow: 12px 12px 0px var(--ink);
				--shadow-hover: 6px 6px 0px var(--ink);
			}

			* {
				box-sizing: border-box;
				margin: 0;
				padding: 0;
			}

			body {
				background-color: var(--bg);
				color: var(--ink);
				font-family: 'JetBrains Mono', 'Noto Sans SC', monospace;
				height: 100vh;
				overflow: hidden;
				display: flex;
				background-image: radial-gradient(#d1cdbc 2px, transparent 2px);
				background-size: 32px 32px;
				user-select: none;
			}

			/* Giant Decorative Marquee Sidebar */
			.marquee-container {
				width: 140px;
				height: 100vh;
				background: var(--primary);
				border-right: 6px solid var(--ink);
				overflow: hidden;
				display: flex;
				align-items: center;
				position: relative;
				z-index: 10;
			}

			.marquee {
				display: flex;
				flex-direction: column;
				white-space: nowrap;
				animation: marquee 15s linear infinite;
			}

			.marquee span {
				font-family: 'Bebas Neue', 'Noto Sans SC', sans-serif;
				font-size: 160px;
				line-height: 0.8;
				color: var(--ink);
				writing-mode: vertical-rl;
				text-orientation: mixed;
				padding: 20px 0;
			}

			.main-content {
				flex: 1;
				display: flex;
				justify-content: center;
				align-items: center;
				padding: 40px;
				gap: 60px;
				position: relative;
				overflow-y: auto;
			}

			/* Left Side: Stats and Controls */
			.dashboard {
				display: flex;
				flex-direction: column;
				gap: 40px;
				max-width: 300px;
				animation: fadeRight 0.8s ease-out;
				z-index: 5;
			}

			.header h1 {
				font-family: 'Bebas Neue', 'Noto Sans SC', sans-serif;
				font-size: 80px;
				line-height: 0.9;
				letter-spacing: 2px;
				margin-bottom: 15px;
				text-shadow: 4px 4px 0px var(--highlight);
			}

			.header p {
				font-size: 14px;
				font-weight: 800;
				text-transform: uppercase;
				border: 2px solid var(--ink);
				display: inline-block;
				padding: 6px 16px;
				background: #fff;
				box-shadow: 4px 4px 0px var(--ink);
			}

			.stats-box {
				background: #fff;
				border: 4px solid var(--ink);
				padding: 24px;
				box-shadow: 8px 8px 0px var(--ink);
				display: flex;
				flex-direction: column;
				gap: 15px;
				position: relative;
			}

			.stats-box::before {
				content: '';
				position: absolute;
				top: -4px;
				right: -4px;
				width: 20px;
				height: 20px;
				background: var(--secondary);
				border-left: 4px solid var(--ink);
				border-bottom: 4px solid var(--ink);
			}

			.stat-row {
				display: flex;
				justify-content: space-between;
				align-items: center;
				font-weight: 800;
				font-size: 18px;
				border-bottom: 2px dashed #ccc;
				padding-bottom: 8px;
			}

			.stat-row:last-child {
				border-bottom: none;
				padding-bottom: 0;
			}

			.btn-group {
				display: flex;
				flex-direction: column;
				gap: 16px;
			}

			.brutal-select {
				appearance: none;
				background: #fff;
				color: var(--ink);
				border: 4px solid var(--ink);
				padding: 8px 12px;
				font-family: 'JetBrains Mono', 'Noto Sans SC', monospace;
				font-weight: 800;
				font-size: 16px;
				cursor: pointer;
				box-shadow: 4px 4px 0px var(--ink);
				transition: all 0.1s ease;
				outline: none;
				border-radius: 0;
			}
			.brutal-select:focus {
				background: var(--peer);
			}

			button.brutal-btn {
				background: #fff;
				color: var(--ink);
				border: 4px solid var(--ink);
				padding: 16px 20px;
				font-family: 'JetBrains Mono', 'Noto Sans SC', monospace;
				font-weight: 800;
				font-size: 18px;
				cursor: pointer;
				box-shadow: 6px 6px 0px var(--ink);
				transition: all 0.1s ease;
				text-transform: uppercase;
				position: relative;
				overflow: hidden;
				outline: none;
			}

			button.brutal-btn::before {
				content: '';
				position: absolute;
				top: 0;
				left: 0;
				right: 0;
				bottom: 0;
				background: var(--secondary);
				z-index: 0;
				transform: scaleX(0);
				transform-origin: left;
				transition: transform 0.2s ease;
			}

			button.brutal-btn.primary::before {
				background: var(--primary);
			}
			button.brutal-btn.danger::before {
				background: var(--error);
			}

			button.brutal-btn span {
				position: relative;
				z-index: 1;
			}

			button.brutal-btn:hover {
				transform: translate(2px, 2px);
				box-shadow: 4px 4px 0px var(--ink);
			}

			button.brutal-btn:hover::before {
				transform: scaleX(1);
			}

			button.brutal-btn.primary:hover span,
			button.brutal-btn.danger:hover span {
				color: #fff;
			}

			button.brutal-btn:active {
				transform: translate(6px, 6px);
				box-shadow: 0px 0px 0px var(--ink);
			}

			/* Right Side: The Grid */
			.board-container {
				perspective: 1000px;
			}

			.sudoku-grid {
				display: grid;
				grid-template-columns: repeat(3, 1fr);
				grid-template-rows: repeat(3, 1fr);
				gap: 6px;
				background: var(--ink);
				border: 8px solid var(--ink);
				box-shadow: var(--shadow);
				width: 80vh;
				max-width: 600px;
				aspect-ratio: 1;
				animation: popUp 0.8s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
				transform-origin: center;
			}

			.block {
				display: grid;
				grid-template-columns: repeat(3, 1fr);
				grid-template-rows: repeat(3, 1fr);
				gap: 2px;
				background: var(--ink);
			}

			.cell {
				background: #fff;
				display: flex;
				justify-content: center;
				align-items: center;
				font-size: 2.5rem;
				font-weight: 800;
				color: var(--ink);
				cursor: pointer;
				transition:
					background 0.1s,
					color 0.1s,
					transform 0.05s;
				position: relative;
			}

			.cell:hover {
				background: var(--peer);
			}

			.cell.initial {
				color: var(--ink);
			}

			.cell.user-input {
				color: var(--user-ink);
			}

			.cell.peer {
				background: var(--peer);
			}

			.cell.same-number {
				background: var(--highlight);
				color: var(--ink);
			}

			.cell.selected {
				background: var(--primary) !important;
				color: #fff !important;
				transform: scale(1.05);
				z-index: 2;
				box-shadow: 0 0 10px rgba(0, 0, 0, 0.5);
				outline: 4px solid var(--ink);
			}

			.cell.error {
				color: var(--error) !important;
				animation: errorShake 0.4s;
				background: #ffe5ec !important;
			}

			/* Numpad for mobile / alternative input */
			.numpad {
				display: none;
				grid-template-columns: repeat(5, 1fr);
				gap: 8px;
				margin-top: 30px;
				width: 100%;
				max-width: 600px;
			}

			.numpad button {
				padding: 15px 0;
				font-size: 24px;
			}

			@media (max-width: 1024px) {
				body {
					flex-direction: column;
					overflow: auto;
					height: auto;
				}
				.marquee-container {
					width: 100%;
					height: 60px;
					border-right: none;
					border-bottom: 6px solid var(--ink);
				}
				.marquee {
					flex-direction: row;
					animation: marquee-horizontal 20s linear infinite;
				}
				.marquee span {
					writing-mode: horizontal-tb;
					font-size: 60px;
					padding: 0 20px;
				}
				.main-content {
					flex-direction: column;
					padding: 20px;
					gap: 40px;
				}
				.dashboard {
					max-width: 100%;
					width: 100%;
				}
				.sudoku-grid {
					width: 100%;
					max-width: 500px;
				}
				.numpad {
					display: grid;
				}
			}

			/* Animations */
			@keyframes marquee {
				0% {
					transform: translateY(0);
				}
				100% {
					transform: translateY(-50%);
				}
			}
			@keyframes marquee-horizontal {
				0% {
					transform: translateX(0);
				}
				100% {
					transform: translateX(-50%);
				}
			}
			@keyframes popUp {
				0% {
					transform: scale(0.8) rotateX(10deg);
					opacity: 0;
					box-shadow: 0 0 0 var(--ink);
				}
				100% {
					transform: scale(1) rotateX(0);
					opacity: 1;
					box-shadow: var(--shadow);
				}
			}
			@keyframes fadeRight {
				0% {
					transform: translateX(-30px);
					opacity: 0;
				}
				100% {
					transform: translateX(0);
					opacity: 1;
				}
			}
			@keyframes errorShake {
				0%,
				100% {
					transform: translateX(0);
				}
				20%,
				60% {
					transform: translateX(-6px) rotate(-2deg);
				}
				40%,
				80% {
					transform: translateX(6px) rotate(2deg);
				}
			}

			/* Win Overlay */
			.win-overlay {
				position: fixed;
				top: 0;
				left: 0;
				right: 0;
				bottom: 0;
				background: rgba(17, 17, 17, 0.95);
				display: flex;
				justify-content: center;
				align-items: center;
				z-index: 100;
				opacity: 0;
				pointer-events: none;
				transition: opacity 0.4s;
				backdrop-filter: blur(5px);
			}
			.win-overlay.active {
				opacity: 1;
				pointer-events: all;
			}
			.win-box {
				background: var(--bg);
				border: 8px solid var(--ink);
				padding: 60px;
				text-align: center;
				transform: scale(0.8) translateY(50px);
				transition: transform 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275);
				box-shadow: 20px 20px 0px var(--highlight);
				max-width: 90%;
			}
			.win-overlay.active .win-box {
				transform: scale(1) rotate(-2deg) translateY(0);
			}
			.win-box h2 {
				font-family: 'Bebas Neue', 'Noto Sans SC', sans-serif;
				font-size: 120px;
				line-height: 1;
				margin-bottom: 20px;
				color: var(--ink);
				text-shadow: 6px 6px 0px var(--secondary);
			}
			.win-stats {
				font-family: 'JetBrains Mono', 'Noto Sans SC', monospace;
				font-size: 22px;
				font-weight: 800;
				margin-bottom: 40px;
				background: #fff;
				padding: 15px;
				border: 4px solid var(--ink);
				display: inline-block;
			}
		</style>
	</head>
	<body>
		<!-- Left Marquee Banner -->
		<aside class="marquee-container">
			<div class="marquee">
				<span>数 独 &nbsp; 数 独 &nbsp; 数 独 &nbsp; 数 独 &nbsp; 数 独 &nbsp; 数 独 &nbsp;</span>
				<span>数 独 &nbsp; 数 独 &nbsp; 数 独 &nbsp; 数 独 &nbsp; 数 独 &nbsp; 数 独 &nbsp;</span>
			</div>
		</aside>

		<main class="main-content">
			<!-- Dashboard & Controls -->
			<section class="dashboard">
				<div class="header">
					<h1>数 独</h1>
					<p>新粗野主义版</p>
				</div>

				<div class="stats-box">
					<div class="stat-row">
						<span>难度</span>
						<select id="difficulty-select" class="brutal-select">
							<option value="30">简单 (30空)</option>
							<option value="45" selected>中等 (45空)</option>
							<option value="60">困难 (60空)</option>
						</select>
					</div>
					<div class="stat-row">
						<span>用时</span>
						<span id="timer">00:00</span>
					</div>
				</div>

				<div class="btn-group">
					<button class="brutal-btn primary" id="btn-new"><span>新 局</span></button>
					<button class="brutal-btn" id="btn-clear"><span>清 除</span></button>
					<button class="brutal-btn danger" id="btn-solve"><span>认 输</span></button>
				</div>
			</section>

			<!-- Game Board Area -->
			<section class="board-container">
				<div class="sudoku-grid" id="grid">
					<!-- Dynamically generated via JS -->
				</div>

				<div class="numpad" id="numpad">
					<!-- Dynamically generated via JS -->
				</div>
			</section>
		</main>

		<!-- Win Overlay Screen -->
		<div class="win-overlay" id="win-overlay">
			<div class="win-box">
				<h2>解 开 了 !</h2>
				<div class="win-stats">用时: <span id="final-time" style="color: var(--primary)">00:00</span></div>
				<br />
				<button class="brutal-btn primary" onclick="newGame()"><span>再来一局</span></button>
			</div>
		</div>

		<script>
			// A valid completed Sudoku board
			const solvedPuzzle = [
				5, 3, 4, 6, 7, 8, 9, 1, 2, 6, 7, 2, 1, 9, 5, 3, 4, 8, 1, 9, 8, 3, 4, 2, 5, 6, 7, 8, 5, 9, 7, 6, 1, 4, 2, 3, 4, 2, 6, 8, 5, 3, 7, 9, 1, 7, 1, 3, 9, 2, 4,
				8, 5, 6, 9, 6, 1, 5, 3, 7, 2, 8, 4, 2, 8, 7, 4, 1, 9, 6, 3, 5, 3, 4, 5, 2, 8, 6, 1, 7, 9
			]

			let currentPuzzle = []
			let userBoard = []
			let initialBoard = []
			let selectedCellIndex = null
			let timer = 0
			let timerInterval

			// Base functions
			function generatePuzzle(difficulty = 45) {
				// 45 empty cells is medium-hard
				currentPuzzle = [...solvedPuzzle]
				let empties = 0
				while (empties < difficulty) {
					let idx = Math.floor(Math.random() * 81)
					if (currentPuzzle[idx] !== 0) {
						currentPuzzle[idx] = 0
						empties++
					}
				}
				userBoard = [...currentPuzzle]
				initialBoard = currentPuzzle.map(val => val !== 0)
			}

			function renderBoard() {
				const gridEl = document.getElementById('grid')
				gridEl.innerHTML = ''

				// Create 9 blocks (3x3 inner grids)
				const blocks = []
				for (let i = 0; i < 9; i++) {
					const block = document.createElement('div')
					block.className = 'block'
					blocks.push(block)
					gridEl.appendChild(block)
				}

				// Create 81 cells and assign to the correct block
				for (let r = 0; r < 9; r++) {
					for (let c = 0; c < 9; c++) {
						const i = r * 9 + c
						const b = Math.floor(r / 3) * 3 + Math.floor(c / 3)

						const cell = document.createElement('div')
						cell.className = 'cell'
						if (initialBoard[i]) cell.classList.add('initial')
						else if (userBoard[i] !== 0) cell.classList.add('user-input')

						cell.dataset.index = i
						cell.dataset.row = r
						cell.dataset.col = c
						cell.dataset.block = b

						if (userBoard[i] !== 0) {
							cell.textContent = userBoard[i]
						}

						// Click handler
						cell.addEventListener('mousedown', () => selectCell(i))

						blocks[b].appendChild(cell)
					}
				}
				updateHighlights()
			}

			function selectCell(index) {
				selectedCellIndex = index
				updateHighlights()
			}

			function updateHighlights() {
				const cells = document.querySelectorAll('.cell')
				// Reset state
				cells.forEach(c => {
					c.classList.remove('selected', 'peer', 'same-number')
				})

				if (selectedCellIndex === null) return

				const sr = Math.floor(selectedCellIndex / 9)
				const sc = selectedCellIndex % 9
				const sb = Math.floor(sr / 3) * 3 + Math.floor(sc / 3)
				const selectedValue = userBoard[selectedCellIndex]

				cells.forEach(cell => {
					const i = parseInt(cell.dataset.index)
					const r = parseInt(cell.dataset.row)
					const c = parseInt(cell.dataset.col)
					const b = parseInt(cell.dataset.block)

					// Highlight Selected Cell
					if (i === selectedCellIndex) {
						cell.classList.add('selected')
					}
					// Highlight Peers (Row, Column, Block)
					else if (r === sr || c === sc || b === sb) {
						cell.classList.add('peer')
					}

					// Highlight all matching numbers
					if (selectedValue !== 0 && userBoard[i] === selectedValue && i !== selectedCellIndex) {
						cell.classList.add('same-number')
					}
				})
			}

			function handleInput(num) {
				if (selectedCellIndex === null) return
				if (initialBoard[selectedCellIndex]) {
					// Shake if trying to edit an initial number
					const cellEl = document.querySelector(`.cell[data-index="${selectedCellIndex}"]`)
					cellEl.classList.remove('error')
					void cellEl.offsetWidth // trigger reflow
					cellEl.classList.add('error')
					setTimeout(() => cellEl.classList.remove('error'), 400)
					return
				}

				const cellEl = document.querySelector(`.cell[data-index="${selectedCellIndex}"]`)
				cellEl.classList.remove('error')

				if (num === 0) {
					userBoard[selectedCellIndex] = 0
					cellEl.textContent = ''
					cellEl.classList.remove('user-input')
					updateHighlights()
					return
				}

				userBoard[selectedCellIndex] = num
				cellEl.textContent = num
				cellEl.classList.add('user-input')

				// Check win condition silently
				checkWin()

				updateHighlights()
			}

			function handleKeyDown(e) {
				// Ignore if win overlay is active
				if (document.getElementById('win-overlay').classList.contains('active')) return

				if (e.key >= '1' && e.key <= '9') {
					handleInput(parseInt(e.key))
				} else if (e.key === 'Backspace' || e.key === 'Delete' || e.key === '0') {
					handleInput(0)
				} else if (selectedCellIndex !== null) {
					let r = Math.floor(selectedCellIndex / 9)
					let c = selectedCellIndex % 9

					if (e.key === 'ArrowUp') r = Math.max(0, r - 1)
					if (e.key === 'ArrowDown') r = Math.min(8, r + 1)
					if (e.key === 'ArrowLeft') c = Math.max(0, c - 1)
					if (e.key === 'ArrowRight') c = Math.min(8, c + 1)

					selectCell(r * 9 + c)
					e.preventDefault()
				}
			}

			function checkWin() {
				// Check if userBoard perfectly matches solvedPuzzle
				for (let i = 0; i < 81; i++) {
					if (userBoard[i] !== solvedPuzzle[i]) return
				}
				// Win Condition
				clearInterval(timerInterval)
				document.getElementById('win-overlay').classList.add('active')
				document.getElementById('final-time').textContent = formatTime(timer)
			}

			function formatTime(seconds) {
				const m = Math.floor(seconds / 60)
					.toString()
					.padStart(2, '0')
				const s = (seconds % 60).toString().padStart(2, '0')
				return `${m}:${s}`
			}

			function startTimer() {
				clearInterval(timerInterval)
				timer = 0
				document.getElementById('timer').textContent = '00:00'
				timerInterval = setInterval(() => {
					timer++
					document.getElementById('timer').textContent = formatTime(timer)
				}, 1000)
			}

			function newGame() {
				const diffSelect = document.getElementById('difficulty-select')
				const difficulty = diffSelect ? parseInt(diffSelect.value) : 45
				generatePuzzle(difficulty) // Generate new puzzle mask
				document.getElementById('win-overlay').classList.remove('active')
				selectedCellIndex = null
				renderBoard()
				startTimer()
			}

			function solveGame() {
				if (confirm('你确定要认输吗？')) {
					userBoard = [...solvedPuzzle]
					renderBoard()
					checkWin()
				}
			}

			// Click outside to deselect
			document.addEventListener('mousedown', e => {
				if (!e.target.closest('.sudoku-grid') && !e.target.closest('.numpad') && !e.target.closest('.btn-group')) {
					selectedCellIndex = null
					updateHighlights()
				}
			})

			// Initialize events
			document.addEventListener('keydown', handleKeyDown)
			document.getElementById('btn-new').addEventListener('click', newGame)
			document.getElementById('btn-clear').addEventListener('click', () => {
				if (selectedCellIndex !== null) handleInput(0)
			})
			document.getElementById('btn-solve').addEventListener('click', solveGame)

			// Build Numpad for mobile
			const numpad = document.getElementById('numpad')
			for (let i = 1; i <= 9; i++) {
				const btn = document.createElement('button')
				btn.className = 'brutal-btn'
				btn.innerHTML = `<span>${i}</span>`
				btn.onclick = () => handleInput(i)
				numpad.appendChild(btn)
			}
			const delBtn = document.createElement('button')
			delBtn.className = 'brutal-btn danger'
			delBtn.innerHTML = `<span>删除</span>`
			delBtn.onclick = () => handleInput(0)
			numpad.appendChild(delBtn)

			// Start!
			newGame()
		</script>
	</body>
</html>
